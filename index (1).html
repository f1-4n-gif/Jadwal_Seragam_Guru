<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Seragam SMPN 6 Manokwari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-glow { animation: glow 3s ease-in-out infinite; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Audio Element -->
    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <!-- App Root -->
    <div id="app">
        <!-- Konten akan dimuat oleh JavaScript -->
    </div>

    <script>
        // Data & Assets
        const logoUrl = "https://i.ibb.co.com/JWy6dhzM/LOGO-SMP6-1-removebg-preview.png";
        const assets = {
            kheki: "https://i.ibb.co.com/svcVsb0L/Chat-GPT-Image-12-Mar-2026-10-44-31.png",
            hitamPutih: "https://i.ibb.co.com/S41JCQqH/Chat-GPT-Image-12-Mar-2026-10-52-52.png",
            pramuka: "https://i.ibb.co.com/Zpn5vRQS/Chat-GPT-Image-12-Mar-2026-11-18-06.png",
            batikV1: "https://i.ibb.co.com/9jNwkVY/Chat-GPT-Image-12-Mar-2026-11-23-10.png",
            batikV2: "https://i.ibb.co.com/qYvc80Jy/Chat-GPT-Image-12-Mar-2026-11-27-07.png",
            batikKamisW2: "https://i.ibb.co.com/zTvyX9G9/Chat-GPT-Image-12-Mar-2026-11-32-33.png",
            batikKamisW4: "https://i.ibb.co.com/fG88G0kG/Chat-GPT-Image-12-Mar-2026-11-45-04.png",
            batikJumatW4: "https://i.ibb.co.com/hxynGQLm/Chat-GPT-Image-12-Mar-2026-12-01-12.png",
            batikKorpri: "https://i.ibb.co.com/C357CD8h/Chat-GPT-Image-12-Mar-2026-11-50-41.png",
            batikPgri: "https://i.ibb.co.com/C35ZcyJM/Chat-GPT-Image-12-Mar-2026-12-04-40.png"
        };

        const weeks = [
            { id: 1, label: "Minggu 1", range: "01 - 07", startDay: 1 },
            { id: 2, label: "Minggu 2", range: "08 - 14", startDay: 8 },
            { id: 3, label: "Minggu 3", range: "15 - 21", startDay: 15 },
            { id: 4, label: "Minggu 4", range: "22 - 31", startDay: 22 }
        ];

        // State Management
        let state = {
            viewDate: new Date(localStorage.getItem('smpn6_last_date') || new Date()),
            isLoggedIn: localStorage.getItem('smpn6_is_logged_in') === 'true',
            isPlaying: false,
            isOnline: navigator.onLine
        };

        function setState(newState) {
            state = { ...state, ...newState };
            render();
            // Save to localStorage for Offline mode
            localStorage.setItem('smpn6_is_logged_in', state.isLoggedIn);
            localStorage.setItem('smpn6_last_date', state.viewDate.toISOString());
        }

        // Logic Functions
        function getWeekNum(date) {
            const day = date.getDate();
            if (day <= 7) return 1;
            if (day <= 14) return 2;
            if (day <= 21) return 3;
            return 4;
        }

        function getUniform(date) {
            const dayIndex = date.getDay();
            const dateNum = date.getDate();
            const week = getWeekNum(date);
            
            if (dayIndex === 0) return { type: 'HOLIDAY', name: 'Libur Sekolah', subtitle: 'Minggu Istirahat', icon: '🏖️' };
            if (dateNum === 17) return { type: 'SPECIAL', name: 'Batik KORPRI', subtitle: 'Hari Kesadaran Nasional', desc: 'Seragam KORPRI lengkap sesuai regulasi.', visual: assets.batikKorpri };
            if (dateNum === 25) return { type: 'SPECIAL', name: 'Batik PGRI', subtitle: 'Hari Guru Nasional', desc: 'Seragam identitas PGRI (Kusuma Bangsa).', visual: assets.batikPgri };

            const daily = {
                1: { name: "Pakaian Kheki", subtitle: "Senin Disiplin", desc: "Seragam Dinas Harian lengkap dengan atribut upacara.", visual: assets.kheki },
                2: { name: "Pakaian Kheki", subtitle: "Selasa Rapi", desc: "Seragam Dinas Harian Kheki.", visual: assets.kheki },
                3: { name: "Hitam Putih", subtitle: "Rabu Formal", desc: "Atasan Putih dan Bawahan Hitam.", visual: assets.hitamPutih },
                4: { 
                    name: "Batik V.1", subtitle: "Kamis Budaya", desc: "Batik identitas sekolah motif pertama.", 
                    visual: week === 4 ? assets.batikKamisW4 : (week === 2 ? assets.batikKamisW2 : assets.batikV1) 
                },
                5: { 
                    name: "Batik V.2", subtitle: "Jumat Berkah", desc: "Batik identitas sekolah motif kedua.", 
                    visual: week === 4 ? assets.batikJumatW4 : assets.batikV2 
                },
                6: { name: "Pramuka", subtitle: "Sabtu Aktif", desc: "Seragam Pramuka lengkap.", visual: assets.pramuka }
            };
            return daily[dayIndex];
        }

        // Event Handlers
        window.addEventListener('online', () => setState({ isOnline: true }));
        window.addEventListener('offline', () => setState({ isOnline: false }));

        function handleWeekSelect(week) {
            const now = new Date();
            const targetDate = new Date(now.getFullYear(), now.getMonth(), week.startDay);
            setState({ viewDate: targetDate, isLoggedIn: true });
        }

        function changeDate(offset) {
            const next = new Date(state.viewDate);
            next.setDate(state.viewDate.getDate() + offset);
            setState({ viewDate: next });
        }

        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            if (state.isPlaying) {
                audio.pause();
                setState({ isPlaying: false });
            } else {
                audio.play().catch(() => {});
                setState({ isPlaying: true });
            }
        }

        function logout() {
            setState({ isLoggedIn: false });
            localStorage.removeItem('smpn6_is_logged_in');
        }

        // UI Components
        function render() {
            const app = document.getElementById('app');
            
            if (!state.isLoggedIn) {
                app.innerHTML = `
                    <div class="min-h-screen bg-slate-950 text-white flex flex-col p-6 overflow-y-auto">
                        <div class="flex-1 flex flex-col items-center justify-center text-center py-10">
                            <div class="mb-8 relative">
                                <div class="absolute inset-0 bg-blue-500 blur-3xl rounded-full animate-glow"></div>
                                <div class="relative z-10 animate-float">
                                    <img src="${logoUrl}" class="w-32 h-32 drop-shadow-[0_0_15px_rgba(59,130,246,0.8)]" alt="Logo">
                                </div>
                            </div>
                            <h1 class="text-3xl font-black italic uppercase tracking-tighter mb-2">SMPN 6 MANOKWARI</h1>
                            <p class="text-blue-500 text-[10px] font-bold tracking-[0.3em] uppercase mb-12">Portal Jadwal Seragam</p>

                            <div class="w-full space-y-3 max-w-xs">
                                <div class="flex justify-between items-center px-2 mb-2">
                                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                                        <i data-lucide="clock" class="w-3 h-3"></i> Pilih Periode Minggu
                                    </p>
                                    ${!state.isOnline ? `
                                        <span class="flex items-center gap-1 text-[9px] font-bold text-amber-500 uppercase bg-amber-500/10 px-2 py-0.5 rounded-full">
                                            <i data-lucide="wifi-off" class="w-2.5 h-2.5"></i> Offline
                                        </span>
                                    ` : ''}
                                </div>
                                ${weeks.map(w => `
                                    <button onclick="handleWeekSelect(${JSON.stringify(w).replace(/"/g, '&quot;')})" 
                                            class="w-full flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-2xl active:bg-blue-600 active:scale-95 transition-all shadow-lg group">
                                        <div class="flex items-center gap-4">
                                            <div class="w-10 h-10 rounded-xl bg-blue-500/20 text-blue-400 flex items-center justify-center font-black italic">
                                                ${w.id}
                                            </div>
                                            <div class="text-left">
                                                <div class="font-black text-sm uppercase italic tracking-tight">${w.label}</div>
                                                <div class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">Tgl ${w.range}</div>
                                            </div>
                                        </div>
                                        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-600 group-hover:text-blue-400"></i>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                const uniform = getUniform(state.viewDate);
                const weekNum = getWeekNum(state.viewDate);
                
                app.innerHTML = `
                    <div class="min-h-screen pb-28">
                        <!-- Floating Controls -->
                        <div class="fixed bottom-8 right-6 z-[60] flex flex-col gap-3">
                            <button onclick="setState({viewDate: new Date()})" class="p-4 bg-white text-blue-600 rounded-full shadow-2xl border border-slate-100 active:scale-90 transition-transform">
                                <i data-lucide="calendar" class="w-6 h-6"></i>
                            </button>
                            <button onclick="toggleMusic()" class="p-4 rounded-full shadow-2xl transition-all ${state.isPlaying ? 'bg-blue-600 text-white scale-110' : 'bg-white text-slate-400 border border-slate-100'}">
                                <i data-lucide="${state.isPlaying ? 'volume-2' : 'volume-x'}" class="w-6 h-6"></i>
                            </button>
                        </div>

                        <header class="bg-slate-900 text-white p-6 pt-8 rounded-b-[3rem] shadow-2xl relative overflow-hidden">
                            <div class="flex items-center justify-between relative z-10 mb-8">
                                <div class="flex items-center gap-3">
                                    <div class="bg-white p-1.5 rounded-xl shadow-lg animate-pulse">
                                        <img src="${logoUrl}" class="w-8 h-8 object-contain" alt="Logo">
                                    </div>
                                    <div>
                                        <h2 class="text-xs font-black uppercase italic leading-none flex items-center gap-2">
                                            SMPN 6 ${!state.isOnline ? '<i data-lucide="wifi-off" class="w-2.5 h-2.5 text-amber-500"></i>' : ''}
                                        </h2>
                                        <p class="text-[9px] text-blue-400 font-bold uppercase tracking-tighter">Manokwari</p>
                                    </div>
                                </div>
                                <button onclick="logout()" class="p-3 bg-white/10 rounded-2xl active:bg-red-500 transition-colors">
                                    <i data-lucide="log-out" class="w-4 h-4"></i>
                                </button>
                            </div>

                            <div class="relative z-10 flex items-center justify-between bg-white/5 backdrop-blur-xl rounded-[2rem] p-4 border border-white/10">
                                <button onclick="changeDate(-1)" class="p-3 bg-white/10 rounded-xl active:scale-75 transition-transform">
                                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                                </button>
                                <div class="text-center">
                                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">
                                        ${state.viewDate.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' })}
                                    </p>
                                    <p class="text-xl font-black uppercase italic tracking-tighter">
                                        ${state.viewDate.toLocaleDateString('id-ID', { weekday: 'long' })}, ${state.viewDate.getDate()}
                                    </p>
                                </div>
                                <button onclick="changeDate(1)" class="p-3 bg-white/10 rounded-xl active:scale-75 transition-transform">
                                    <i data-lucide="chevron-right" class="w-6 h-6"></i>
                                </button>
                            </div>
                        </header>

                        <main class="px-6 mt-8 max-w-md mx-auto fade-in">
                            ${!state.isOnline ? `
                                <div class="mb-4 flex items-center justify-center gap-2 bg-amber-500/10 border border-amber-500/20 p-2 rounded-2xl">
                                    <i data-lucide="wifi-off" class="w-3 h-3 text-amber-600"></i>
                                    <span class="text-[10px] font-bold text-amber-700 uppercase tracking-tighter">Mode Offline Aktif</span>
                                </div>
                            ` : ''}

                            ${uniform.type === 'HOLIDAY' ? `
                                <div class="bg-white rounded-[3rem] p-16 text-center border border-slate-200 shadow-sm flex flex-col items-center">
                                    <span class="text-7xl mb-6 opacity-30">🏖️</span>
                                    <h3 class="text-2xl font-black italic uppercase text-slate-300 tracking-tighter">Libur Sekolah</h3>
                                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Waktunya Santai</p>
                                </div>
                            ` : `
                                <div class="space-y-8">
                                    <div class="relative group">
                                        <div class="absolute inset-0 bg-blue-500/10 blur-3xl -z-10 rounded-full"></div>
                                        <div class="relative">
                                            <img src="${uniform.visual}" class="w-full aspect-[3/4] object-cover rounded-[3rem] shadow-2xl border-[6px] border-white" alt="Seragam">
                                            ${!state.isOnline ? '<div class="absolute top-4 right-4 bg-black/40 backdrop-blur-md p-2 rounded-xl"><i data-lucide="info" class="w-4 h-4 text-white opacity-70"></i></div>' : ''}
                                        </div>
                                        <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-white px-5 py-2.5 rounded-2xl shadow-xl flex items-center gap-2 border border-slate-100 min-w-max">
                                            <i data-lucide="map-pin" class="w-3.5 h-3.5 text-blue-600"></i>
                                            <span class="text-[10px] font-black uppercase text-slate-700 tracking-tight">SMPN 6 Manokwari</span>
                                        </div>
                                    </div>

                                    <div class="bg-white rounded-[3rem] p-7 shadow-sm border border-slate-100">
                                        <div class="flex items-center gap-2 mb-3">
                                            <div class="h-1 w-8 bg-blue-600 rounded-full"></div>
                                            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">
                                                ${uniform.subtitle} • Minggu ${weekNum}
                                            </span>
                                        </div>
                                        <h1 class="text-3xl font-black italic uppercase text-slate-900 tracking-tighter leading-none mb-4">${uniform.name}</h1>
                                        <p class="text-slate-500 text-sm font-medium leading-relaxed mb-8">${uniform.desc}</p>
                                        <div class="grid grid-cols-2 gap-3">
                                            <div class="bg-slate-50 p-4 rounded-[2rem] flex flex-col gap-2">
                                                <div class="bg-white w-10 h-10 rounded-2xl shadow-sm flex items-center justify-center text-green-600"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
                                                <span class="text-[9px] font-black uppercase text-slate-400 leading-tight tracking-tighter">Atribut<br>Lengkap</span>
                                            </div>
                                            <div class="bg-slate-50 p-4 rounded-[2rem] flex flex-col gap-2">
                                                <div class="bg-white w-10 h-10 rounded-2xl shadow-sm flex items-center justify-center text-blue-600"><i data-lucide="award" class="w-5 h-5"></i></div>
                                                <span class="text-[9px] font-black uppercase text-slate-400 leading-tight tracking-tighter">Sesuai<br>Standar</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `}
                        </main>
                        <footer class="mt-12 text-center pb-8 opacity-20 italic font-bold">
                            <p class="text-[9px] uppercase tracking-[0.5em]">Tampil Rapi Setiap Hari</p>
                        </footer>
                    </div>
                `;
            }

            // Re-initialize Lucide Icons
            lucide.createIcons();
        }

        // Initial Render
        render();
    </script>
</body>
</html>
